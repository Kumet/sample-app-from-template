name = "node"
markers = ["package.json"]
tool_markers = ["eslint", "typescript"]

[targets]
unit = "test"
full = "validate"

[commands]
setup = ["npm", "ci"]
format-check = ["npm", "run", "format:check"]
lint = ["npm", "run", "lint"]
typecheck = ["npm", "run", "typecheck"]
test = ["npm", "test"]
build = ["npm", "run", "build"]
