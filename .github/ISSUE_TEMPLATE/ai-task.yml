name: AI task
description: A task intended to be executed by Claude Code or Codex
labels: [ai-task]
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include links, screenshots, prior decisions, and relevant files.
    validations:
      required: true
  - type: textarea
    id: task
    attributes:
      label: Task
      description: What should the AI agent do?
    validations:
      required: true
  - type: textarea
    id: done
    attributes:
      label: Definition of done
      placeholder: "- [ ] spec updated\n- [ ] make validate passed"
    validations:
      required: true
  - type: textarea
    id: allowed
    attributes:
      label: Allowed files/areas
    validations:
      required: true
  - type: textarea
    id: forbidden
    attributes:
      label: Forbidden files/areas
      placeholder: ".env, auth, billing, production config, migrations, etc."
    validations:
      required: true
  - type: dropdown
    id: preferred-agent
    attributes:
      label: Preferred agent
      options:
        - Claude Code
        - Codex
        - Either
        - Both: Claude plans, Codex implements
