name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Set up project
        run: make setup

      - name: Validate template files
        run: |
          test -f AGENTS.md
          test -f CLAUDE.md
          test -f Makefile
          test -f .agent-policy.toml
          test -f docs/project-context.md
          test -f .github/pull_request_template.md
          test -f schemas/review-result.schema.json
          test -f adapters/generic.toml

      - name: Check scripts are executable
        run: |
          test -x scripts/init-project.sh
          test -x scripts/check-secrets.sh
          test -x scripts/validate-spec.sh

      - name: Run project validation
        run: make validate

      - name: Qualify stack fixtures
        run: make qualify-stacks

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up project
        run: make setup

      - name: Build container image
        run: make container-build

      - name: Run real container smoke
        run: make container-smoke

      - name: Remove local build image
        if: always()
        run: docker image rm --force local-project-board:local
