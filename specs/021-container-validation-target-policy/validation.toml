version = 2
risk = "high"
auto_merge = false
risk_domains = ["infrastructure"]
max_tasks = 4
max_attempts_per_task = 3
max_final_validation_attempts = 3
max_review_attempts = 3
max_ci_attempts = 3

[validations]
unit = "test"
integration = "integration-test"
full = "validate"

[traceability]
REQ-001 = ["AC-001", "T001", "T002", "T003"]
REQ-002 = ["AC-002", "T002", "T003"]
REQ-003 = ["AC-002", "T001", "T002", "T003"]
REQ-004 = ["AC-003", "T001", "T003"]
REQ-005 = ["AC-004", "T001", "T004"]
REQ-006 = ["AC-004", "T003", "T004"]
REQ-007 = ["AC-005", "T001", "T002", "T004"]

[dependencies]
T002 = ["T001"]
T003 = ["T002"]
T004 = ["T003"]

[scope]
allowed = [".agent-policy.toml", "tests/test_autonomous_core.py", "tests/test_spec_lint.py", "README.md", "docs/**", "specs/021-container-validation-target-policy/**"]
forbidden = [".env", ".env.*", "**/.env", "**/.env.*", "**/*.pem", "**/*.key", "**/credentials.*", "**/secrets.*", "scripts/agent/**", "Makefile", ".github/**", "src/**", ".agent-work/**", ".agent-worktrees/**", ".agent-worktree-owned"]
