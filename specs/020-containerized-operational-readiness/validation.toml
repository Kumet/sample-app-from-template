[scope]
allowed = [
  "Dockerfile",
  ".dockerignore",
  "compose.yaml",
  "Makefile",
  ".github/workflows/ci.yml",
  "scripts/operations/**",
  "tests/app/operations/**",
  "tests/app/integration/**",
  "README.md",
  "specs/020-containerized-operational-readiness/**",
]
forbidden = [
  ".env", ".env.*", "**/.env", "**/.env.*",
  "local.properties", "**/local.properties", "**/*.pem", "**/*.key",
  "**/*.p12", "**/*.pfx", "**/credentials.*", "**/secrets.*",
