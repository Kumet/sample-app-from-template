version = 2
risk = "high"
auto_merge = false
risk_domains = ["infrastructure", "ci"]
max_tasks = 10
max_attempts_per_task = 3
max_final_validation_attempts = 3
max_review_attempts = 3
max_ci_attempts = 3

[validations]
unit = "test"
integration = "integration-test"
container-build = "container-build"
container-smoke = "container-smoke"
full = "validate"

