version = 2
risk = "medium"
auto_merge = false
risk_domains = ["ci-cd"]
max_tasks = 10
max_attempts_per_task = 3
max_final_validation_attempts = 3
max_review_attempts = 3
max_ci_attempts = 3

[validations]
unit = "test"
integration = "integration-test"
full = "validate"

[traceability]
REQ-001 = ["AC-001", "AC-002", "T001"]
REQ-002 = ["AC-002", "AC-003", "T002"]
REQ-003 = ["AC-003", "T002", "T003", "T006"]
REQ-004 = ["AC-001", "AC-004", "AC-005", "AC-006", "AC-008", "AC-009", "T001", "T004"]
REQ-005 = ["AC-004", "AC-005", "AC-006", "AC-007", "AC-008", "AC-009", "AC-010", "T004"]
REQ-006 = ["AC-010", "AC-011", "T004"]
REQ-007 = ["AC-012", "T005"]
REQ-008 = ["AC-013", "T005"]
REQ-009 = ["AC-007", "T003", "T004"]
REQ-010 = ["AC-010", "AC-011", "T004", "T006"]

[dependencies]
T002 = ["T001"]
T003 = ["T002"]
T004 = ["T003"]
T005 = ["T004"]
T006 = ["T005"]

[scope]
allowed = [
  "pyproject.toml",
  "Makefile",
  ".agent-policy.toml",
  ".github/workflows/ci.yml",
  "README.md",
  "docs/**",
  "src/**",
  "tests/**",
  "specs/000-project-bootstrap/**",
]
forbidden = [
  ".env",
  ".env.*",
  "**/.env",
  "**/.env.*",
  "local.properties",
  "**/*.pem",
  "**/*.key",
  "**/credentials.*",
  "**/secrets.*",
]
