version = 2
risk = "medium"
auto_merge = false
risk_domains = []
max_tasks = 20
max_attempts_per_task = 3
max_final_validation_attempts = 3
max_review_attempts = 3
max_ci_attempts = 3

[validations]
unit = "test"
full = "validate"

[traceability]
REQ-001 = ["AC-001", "T001"]
REQ-002 = ["AC-002", "T002"]
REQ-003 = ["AC-003", "T003"]

[dependencies]
T002 = ["T001"]
T003 = ["T002"]

[scope]
allowed = ["src/**", "tests/**", "docs/**", "specs/<feature>/**"]
forbidden = [".env", ".env.*", "**/.env", "**/.env.*", "local.properties", "**/local.properties", "**/*.pem", "**/*.key", "**/*.p12", "**/*.pfx"]
