services:
  project-board:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - project-board-data:/data
    init: true
    restart: "on-failure:3"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import json, urllib.request; response =
          urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2);
          assert response.status == 200; assert json.load(response) ==
          {'status': 'ok'}
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  project-board-data: {}
